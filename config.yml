repo_url: https://fdroid.privacyguides.org/fdroid/repo
repo_name: Privacy Guides
repo_description: An F-Droid repository from Privacy Guides

keystore: keystore.keystore

# Secrets are injected at runtime from the workflow environment (GitHub Actions
# secrets) using fdroidserver's {env: VAR} substitution, so nothing sensitive is
# ever written to disk or committed here.
repo_keyalias: {env: KEY_ALIAS}
keystorepass: {env: KEYSTORE_PASS}
keypass: {env: KEY_PASS}
keydname: {env: KEY_DNAME}

mirrors:
  - url: https://fdroid-repo-e61d.pages.dev/fdroid
  - url: https://privacyguides.github.io/fdroid
  - url: https://privacyguides-fdroid.b-cdn.net/fdroid
