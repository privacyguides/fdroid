name: Build

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/github.yml'
      - 'build.sh'
      - 'update.sh'
  workflow_dispatch:
  schedule:
  - cron: "0 0 * * *"

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    container:
      image: debian:latest

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          apt update
          apt install aapt curl git fdroidserver -y
          mkdir -p fdroid/repo
          echo "$KEYSTORE" | base64 -d - > fdroid/keystore.keystore
          mv config.yml fdroid/config.yml
          sed -i "s/KEYALIAS/$(echo "$KEYALIAS" | sed -e "s/\&/\\\&/")/" fdroid/config.yml
          sed -i "s/PASS/$(echo "$PASS" | sed -e "s/\&/\\\&/")/" fdroid/config.yml
          sed -i "s/KEYDNAME/$(echo "$KEYDNAME" | sed -e "s/\&/\\\&/")/" fdroid/config.yml
          chmod +x update.sh
          ./update.sh
          rm fdroid/keystore.keystore
          rm fdroid/config.yml
          mkdir public
          mv fdroid public/
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYALIAS: ${{ secrets.KEYAILAS }}
          PASS: ${{ secrets.PASS }}
          KEYDNAME: ${{ secrets.KEYDNAME }}

      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
